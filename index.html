<!DOCTYPE html>
<html>
<head>
  <title>Outreach Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 15px;
      margin: 0;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      margin-bottom: 15px;
    }

    .controls, .inputs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    input, select, button {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 14px;
      flex: 1;
      min-width: 120px;
    }

    button {
      background: #111;
      color: white;
      cursor: pointer;
      flex: 1;
    }

    button:hover {
      background: #333;
    }

    .delete-btn {
      background: #ff4d4d;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #cc0000;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      min-width: 700px;
    }

    th {
      background: #111;
      color: white;
      text-align: left;
    }

    td, th {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:15px;
      margin-bottom:20px;
    }

    .stat-card{
      background:white;
      padding:20px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }

    .stat-card h3{
      margin:0 0 10px;
      font-size:16px;
      color:#555;
    }

    .stat-card p{
      margin:0;
      font-size:30px;
      font-weight:bold;
      color:#111;
    }

    @media (max-width: 600px) {
      h2 {
        font-size: 18px;
      }

      input, select, button {
        font-size: 13px;
        padding: 8px;
      }

      table {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

<h2>📊 Outreach Tracker</h2>

<!-- ANALYTICS -->
<div class="stats">

  <div class="stat-card">
    <h3>Total Companies</h3>
    <p id="totalCompanies">0</p>
  </div>

  <div class="stat-card">
    <h3>Reached Out</h3>
    <p id="reachedOut">0</p>
  </div>

  <div class="stat-card">
    <h3>Interested</h3>
    <p id="interested">0</p>
  </div>

  <div class="stat-card">
    <h3>Converted</h3>
    <p id="converted">0</p>
  </div>

  <div class="stat-card">
    <h3>Failed</h3>
    <p id="failed">0</p>
  </div>

</div>

<div class="card inputs">
  <input id="category" placeholder="Category">
  <input id="company" placeholder="Company Name">
  <input id="issue" placeholder="Website Issue">
</div>

<div class="card controls">
  <button onclick="addData()">Add</button>
  <button onclick="exportData()">Download Excel</button>
</div>

<div class="card controls">
  <input id="search" placeholder="🔍 Search..." onkeyup="renderTable()">

  <select id="filter" onchange="renderTable()">
    <option value="All">All Categories</option>
  </select>
</div>

<div class="table-container">
  <table id="table">
    <tr>
      <th>#</th>
      <th>Category</th>
      <th>Company</th>
      <th>Issue</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAT9sZW42HDkbrEOlGoivgGEtWqSQlCorI",
  authDomain: "outreach-tracker-c326c.firebaseapp.com",
  projectId: "outreach-tracker-c326c",
  storageBucket: "outreach-tracker-c326c.firebasestorage.app",
  messagingSenderId: "187476749037",
  appId: "1:187476749037:web:b445c1c711b406fbe87ae4"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let data = [];

/* LOAD */
db.collection("clients").onSnapshot(snapshot => {

  data = [];

  snapshot.forEach(doc => {
    data.push({
      id: doc.id,
      ...doc.data()
    });
  });

  updateCategories();
  renderTable();
  updateAnalytics();

});

/* ADD */
function addData() {

  let category = document.getElementById("category").value.trim();
  let company = document.getElementById("company").value.trim();
  let issue = document.getElementById("issue").value.trim();

  if (!company) {
    return alert("Company required");
  }

  let exists = data.some(
    d => d.company.toLowerCase() === company.toLowerCase()
  );

  if (exists) {
    return alert("⚠️ Duplicate company!");
  }

  db.collection("clients").add({
    category,
    company,
    issue,
    status: "Not Contacted"
  });

  document.getElementById("category").value = "";
  document.getElementById("company").value = "";
  document.getElementById("issue").value = "";

}

/* DELETE */
function deleteEntry(id) {

  let confirmDelete = confirm(
    "Are you sure you want to delete this entry?"
  );

  if (confirmDelete) {
    db.collection("clients").doc(id).delete();
  }

}

/* RENDER */
function renderTable() {

  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>#</th>
      <th>Category</th>
      <th>Company</th>
      <th>Issue</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  let filter = document.getElementById("filter").value;
  let search = document.getElementById("search").value.toLowerCase();

  let count = 1;

  data.forEach(item => {

    if (
      (filter === "All" || item.category === filter) &&
      item.company.toLowerCase().includes(search)
    ) {

      let row = table.insertRow();

      row.insertCell(0).innerText = count++;
      row.insertCell(1).innerText = item.category;
      row.insertCell(2).innerText = item.company;
      row.insertCell(3).innerText = item.issue;

      /* STATUS */
      let statusCell = row.insertCell(4);

      let select = document.createElement("select");

      [
        "Not Contacted",
        "Reached Out",
        "Interested",
        "Converted",
        "Failed"
      ].forEach(s => {

        let option = document.createElement("option");
        option.text = s;

        select.add(option);

      });

      select.value = item.status;

      select.onchange = () => {

        db.collection("clients")
          .doc(item.id)
          .update({
            status: select.value
          });

      };

      statusCell.appendChild(select);

      /* DELETE */
      let actionCell = row.insertCell(5);

      let btn = document.createElement("button");

      btn.innerText = "Delete";
      btn.className = "delete-btn";

      btn.onclick = () => deleteEntry(item.id);

      actionCell.appendChild(btn);

    }

  });

}

/* FILTER */
function updateCategories() {

  let filter = document.getElementById("filter");

  let existing = new Set();

  filter.innerHTML = `
    <option value="All">All Categories</option>
  `;

  data.forEach(item => {

    if (!existing.has(item.category)) {

      existing.add(item.category);

      let option = document.createElement("option");

      option.value = item.category;
      option.text = item.category;

      filter.appendChild(option);

    }

  });

}

/* ANALYTICS */
function updateAnalytics() {

  document.getElementById("totalCompanies").innerText =
    data.length;

  document.getElementById("reachedOut").innerText =
    data.filter(d => d.status === "Reached Out").length;

  document.getElementById("interested").innerText =
    data.filter(d => d.status === "Interested").length;

  document.getElementById("converted").innerText =
    data.filter(d => d.status === "Converted").length;

  document.getElementById("failed").innerText =
    data.filter(d => d.status === "Failed").length;

}

/* EXPORT */
function exportData() {

  let filter = document.getElementById("filter").value;

  let search = document.getElementById("search")
    .value
    .toLowerCase();

  let rows = [
    ["S/N","Category","Company","Issue","Status"]
  ];

  let count = 1;

  data.forEach(item => {

    if (
      (filter === "All" || item.category === filter) &&
      item.company.toLowerCase().includes(search)
    ) {

      rows.push([
        count++,
        item.category,
        item.company,
        item.issue,
        item.status
      ]);

    }

  });

  let csv = rows.map(r => r.join(",")).join("\n");

  let blob = new Blob(
    [csv],
    { type: "text/csv" }
  );

  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);

  if(filter === "All"){
    link.download = "all_categories.csv";
  } else {
    link.download = filter + ".csv";
  }

  link.click();

}

</script>

</body>
</html>
